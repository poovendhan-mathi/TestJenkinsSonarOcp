# ============================================================
# UAT Deployment — OpenShift / Kubernetes
# ============================================================
# Deploys the expense-tracker app to the UAT namespace.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker
  namespace: expense-tracker-uat
  labels:
    app: expense-tracker
    environment: uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-tracker
      environment: uat
  template:
    metadata:
      labels:
        app: expense-tracker
        environment: uat
    spec:
      containers:
        - name: expense-tracker
          image: docker.io/YOUR_DOCKERHUB_USER/expense-tracker:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
