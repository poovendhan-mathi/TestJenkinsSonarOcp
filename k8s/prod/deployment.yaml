# ============================================================
# Production Deployment — OpenShift / Kubernetes
# ============================================================
# Deploys the expense-tracker app to the Prod namespace.
# More replicas and stricter resource limits than UAT.
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker
  namespace: expense-tracker-prod
  labels:
    app: expense-tracker
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-tracker
      environment: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: expense-tracker
        environment: prod
    spec:
      containers:
        - name: expense-tracker
          image: docker.io/YOUR_DOCKERHUB_USER/expense-tracker:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
